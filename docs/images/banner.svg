<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E65100"/>
      <stop offset="100%" style="stop-color:#1A1A2E"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="900" height="200" rx="12" fill="url(#bg)"/>
  <rect width="900" height="200" rx="12" fill="url(#grid)"/>
  <!-- Network/ISP tools icon -->
  <g transform="translate(70, 50)">
    <!-- Central server -->
    <rect x="35" y="0" width="40" height="30" rx="4" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2.5"/>
    <line x1="42" y1="10" x2="68" y2="10" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
    <line x1="42" y1="16" x2="68" y2="16" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
    <circle cx="66" cy="23" r="2.5" fill="#FF8A65"/>
    <circle cx="58" cy="23" r="2.5" fill="#FF8A65"/>
    <!-- Connection lines -->
    <line x1="55" y1="30" x2="20" y2="60" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
    <line x1="55" y1="30" x2="55" y2="60" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
    <line x1="55" y1="30" x2="90" y2="60" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
    <!-- Left node - monitor -->
    <rect x="6" y="60" width="28" height="20" rx="3" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2"/>
    <line x1="20" y1="80" x2="20" y2="86" stroke="rgba(255,255,255,0.9)" stroke-width="2"/>
    <line x1="12" y1="86" x2="28" y2="86" stroke="rgba(255,255,255,0.9)" stroke-width="2" stroke-linecap="round"/>
    <!-- Center node - wrench -->
    <circle cx="55" cy="75" r="14" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2"/>
    <path d="M48,70 L55,77 L62,70" fill="none" stroke="#FFAB91" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="55" y1="77" x2="55" y2="83" stroke="#FFAB91" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Right node - signal -->
    <rect x="76" y="60" width="28" height="28" rx="3" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2"/>
    <rect x="81" y="78" width="4" height="6" fill="#FF8A65"/>
    <rect x="87" y="74" width="4" height="10" fill="#FF8A65"/>
    <rect x="93" y="68" width="4" height="16" fill="#FF8A65"/>
  </g>
  <!-- Title -->
  <text x="310" y="95" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="bold" fill="white">services-isp</text>
  <!-- Subtitle -->
  <text x="310" y="125" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.7)">Task automation webapp for ISP operations</text>
</svg>
